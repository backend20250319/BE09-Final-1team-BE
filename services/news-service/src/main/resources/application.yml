# Spring Boot news-serviceмқҳ application.yml
# м„ңлІ„ нҸ¬нҠё м„Өм •
server:
  port: 8082

spring:
  application:
    name: news-service
  config:
    import: optional:configserver:http://config-server:8888
  cloud:
    bootstrap:
      enabled: false

# Swagger/OpenAPI м„Өм •
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
  packages-to-scan: com.newnormallist.newsservice.news.controller