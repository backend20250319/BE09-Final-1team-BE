# 카카오 API 설정
kakao:
  app-key: ${KAKAO_APP_KEY:your-app-key}
  client-id: ${KAKAO_CLIENT_ID:your-client-id}
  client-secret: ${KAKAO_CLIENT_SECRET:your-client-secret}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/kakao/redirect}
  template-id: ${KAKAO_TEMPLATE_ID:123798}

# 앱 설정
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}

# Spring Security OAuth2 설정
spring:
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:your-client-secret}
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/kakao/redirect}
            scope: profile_nickname,profile_image,account_email,friends,talk_message
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
